<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f0ede8;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Header ── */
  .page-header {
    padding: 40px 48px 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .page-header h1 { font-size: 2rem; font-weight: 700; }
  .page-header .subtitle { font-size: 0.9rem; color: #6b7280; margin-top: 4px; font-family: monospace; }
  .page-header .updated { font-size: 0.82rem; color: #9ca3af; }
  .back-link {
    position: absolute;
    top: 16px; left: 48px;
    font-size: 0.8rem;
    color: #9ca3af;
    text-decoration: none;
  }
  .back-link:hover { color: #4f8ef7; }

  /* ── Stat cards ── */
  .stats-row {
    display: flex;
    gap: 16px;
    padding: 0 48px 28px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 18px 24px;
    flex: 1;
  }
  .stat-card .label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #9ca3af;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 300;
    color: #1a1a2e;
  }
  .stat-card .value.blue   { color: #3b82f6; }
  .stat-card .value.amber  { color: #d97706; }
  .stat-card .value.black  { color: #1a1a2e; font-weight: 600; }

  /* ── Recommended section ── */
  .rec-section {
    margin: 0 48px 28px;
  }
  .rec-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .rec-header h2 {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #374151;
  }
  .rec-badge {
    background: #dcfce7;
    color: #15803d;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .btn-add-all {
    margin-left: auto;
    padding: 6px 16px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-add-all:hover { background: #2d2d4e; }
  .btn-add-all:disabled { background: #9ca3af; cursor: default; }

  .rec-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .rec-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    min-width: 280px;
    flex: 1 1 280px;
    max-width: 400px;
    transition: box-shadow .12s, border-color .12s;
  }
  .rec-card:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); border-color: #c7d7fd; }
  .rec-card.added { opacity: 0.5; }
  .rec-card-body { flex: 1; min-width: 0; }
  .rec-card-company { font-weight: 600; font-size: 0.88rem; }
  .rec-card-title   { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
  .rec-card-score {
    font-size: 0.78rem;
    font-weight: 700;
    color: #15803d;
    background: #dcfce7;
    padding: 2px 7px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 6px;
    display: inline-block;
  }
  .rec-card-expl {
    font-size: 0.75rem;
    color: #6b7280;
    margin-top: 4px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .btn-rec-add {
    flex: 0 0 auto;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color .12s, color .12s, background .12s;
    white-space: nowrap;
  }
  .btn-rec-add:hover { border-color: #4f8ef7; color: #4f8ef7; background: #f0f6ff; }
  .btn-rec-add.added { border-color: #16a34a; color: #16a34a; background: #f0fdf4; cursor: default; }

  .rec-empty {
    font-size: 0.85rem;
    color: #9ca3af;
    padding: 16px 0;
  }

  /* ── Filter tabs + sort ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 48px 20px;
  }
  .tab {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1.5px solid #e5e7eb;
    background: #fff;
    font-size: 0.85rem;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .tab.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .tab:hover:not(.active) { border-color: #9ca3af; }
  .spacer { flex: 1; }
  .role-count { font-size: 0.82rem; color: #9ca3af; }
  .sort-label { font-size: 0.82rem; color: #9ca3af; }
  .sort-sel {
    padding: 6px 10px;
    border: 1.5px solid #e5e7eb;
    border-radius: 8px;
    font-size: 0.82rem;
    background: #fff;
    cursor: pointer;
    outline: none;
  }

  /* ── Table ── */
  .table-wrap {
    margin: 0 48px 40px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #9ca3af;
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid #f3f4f6;
    background: #fafafa;
  }
  tbody tr { border-bottom: 1px solid #f3f4f6; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 14px 16px; vertical-align: middle; }

  .col-company .company-name { font-weight: 600; font-size: 0.9rem; }
  .col-company .role-name { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }

  .tag-market {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-market-tw { background: #fef3c7; color: #92400e; }
  .tag-market-jp { background: #fee2e2; color: #991b1b; }
  .tag-market-sg { background: #dbeafe; color: #1e40af; }
  .tag-market-us { background: #d1fae5; color: #065f46; }
  .tag-market-unknown { background: #f3f4f6; color: #6b7280; }

  .fit-score { font-weight: 700; font-size: 0.95rem; min-width: 36px; display: inline-block; }
  .fit-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .fit-bar {
    flex: 1;
    height: 6px;
    background: #f3f4f6;
    border-radius: 3px;
    min-width: 60px;
    max-width: 100px;
    overflow: hidden;
  }
  .fit-bar-fill { height: 100%; border-radius: 3px; background: #1a1a2e; }
  .fit-bar-fill.high { background: #16a34a; }
  .fit-bar-fill.mid  { background: #d97706; }
  .fit-bar-fill.low  { background: #9ca3af; }

  .badge-verdict {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .badge-verdict-recommend { background: #dcfce7; color: #15803d; }
  .badge-verdict-pass      { background: #f3f4f6; color: #6b7280; }
  .badge-verdict-none      { background: #f9fafb; color: #d1d5db; }

  .status-sel {
    padding: 4px 8px;
    border: 1.5px solid #e5e7eb;
    border-radius: 6px;
    font-size: 0.8rem;
    background: #fff;
    cursor: pointer;
    outline: none;
    min-width: 120px;
  }
  .status-sel:focus { border-color: #4f8ef7; }

  .notes-input {
    width: 100%;
    min-width: 140px;
    border: none;
    background: transparent;
    font-size: 0.8rem;
    color: #374151;
    outline: none;
    padding: 2px 4px;
    border-radius: 4px;
    resize: none;
    font-family: inherit;
  }
  .notes-input:focus { background: #f9fafb; border: 1px solid #e5e7eb; }

  /* ── Feedback buttons ── */
  .feedback-btns { display: flex; gap: 4px; align-items: center; }
  .btn-feedback {
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 5px;
    font-size: 0.8rem;
    padding: 2px 7px;
    cursor: pointer;
    transition: background .12s, border-color .12s;
    color: #9ca3af;
  }
  .btn-feedback:hover { border-color: #9ca3af; color: #374151; background: #f9fafb; }
  .btn-feedback.up   { border-color: #86efac; color: #16a34a; background: #f0fdf4; }
  .btn-feedback.down { border-color: #fca5a5; color: #dc2626; background: #fff1f2; }

  .btn-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: #d1d5db;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color .12s;
  }
  .btn-remove:hover { color: #ef4444; }

  .col-date { font-size: 0.78rem; color: #9ca3af; white-space: nowrap; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
  }

  /* ── Feedback modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px 28px;
    width: 360px;
    max-width: 95vw;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .modal-reasons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .modal-reason {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color .12s, background .12s;
  }
  .modal-reason:hover { border-color: #9ca3af; background: #f9fafb; }
  .modal-reason.selected { border-color: #4f8ef7; background: #f0f6ff; }
  .modal-reason input[type=radio] { accent-color: #4f8ef7; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 7px 18px;
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    background: #fff;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .btn-cancel:hover { background: #f9fafb; }
  .btn-confirm {
    padding: 7px 18px;
    border: none;
    border-radius: 7px;
    background: #1a1a2e;
    color: #fff;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-confirm:hover { background: #2d2d4e; }
</style>
</head>
<body>

<a href="/jobs" class="back-link">← Job Board</a>

<div class="page-header">
  <div>
    <h1 id="header-name">Pipeline</h1>
    <div class="subtitle" id="header-subtitle">Job Search Tracker</div>
  </div>
  <div class="updated" id="header-updated"></div>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="label">Total Reviewed</div>
    <div class="value" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Recommended</div>
    <div class="value" id="stat-recommended">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Applied</div>
    <div class="value blue" id="stat-applied">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Interviewing</div>
    <div class="value amber" id="stat-interviewing">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Avg Fit Score</div>
    <div class="value black" id="stat-avg">—</div>
  </div>
</div>

<!-- ── Recommended Jobs ── -->
<div class="rec-section" id="rec-section" style="display:none">
  <div class="rec-header">
    <h2>Recommended Jobs</h2>
    <span class="rec-badge" id="rec-badge">0</span>
    <button class="btn-add-all" id="btn-add-all">+ Add All</button>
  </div>
  <div class="rec-cards" id="rec-cards"></div>
</div>

<div class="toolbar">
  <button class="tab active" data-filter="all">All</button>
  <button class="tab" data-filter="recommended">Recommended</button>
  <button class="tab" data-filter="applied">Applied</button>
  <button class="tab" data-filter="interviewing">Interviewing</button>
  <button class="tab" data-filter="pass">Pass</button>
  <div class="spacer"></div>
  <span class="role-count" id="role-count"></span>
  <span class="sort-label">Sort by</span>
  <select class="sort-sel" id="sort-sel">
    <option value="score-desc">Fit score (high)</option>
    <option value="score-asc">Fit score (low)</option>
    <option value="date-desc">Newest first</option>
    <option value="company">Company A→Z</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Company / Role</th>
        <th>Market</th>
        <th>Fit Score</th>
        <th>Verdict</th>
        <th>Status</th>
        <th>Notes</th>
        <th>Added</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="pipeline-tbody">
      <tr><td colspan="8"><div class="empty">Loading…</div></td></tr>
    </tbody>
  </table>
</div>

<!-- ── Feedback Modal ── -->
<div class="modal-overlay hidden" id="feedback-modal">
  <div class="modal">
    <h3 id="feedback-title">Why was this score off?</h3>
    <div class="modal-reasons" id="feedback-reasons"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="feedback-cancel">Cancel</button>
      <button class="btn-confirm" id="feedback-confirm">Submit</button>
    </div>
  </div>
</div>

<script>
  let ALL_ENTRIES  = [];
  let ALL_MATCHES  = [];   // from /api/resume/matches
  let PIPELINE_IDS = new Set();
  let RESUME_ID    = null;
  let FILTER = 'all';

  // Feedback state
  let _fbJob    = null;
  let _fbRating = null;

  const DOWN_REASONS = [
    { value: 'wrong_industry',   label: '產業不符 (Wrong industry)' },
    { value: 'physical_goods',   label: '實體/供應鏈職位 (Physical goods / supply chain)' },
    { value: 'wrong_level',      label: '職等不符 (Wrong seniority level)' },
    { value: 'wrong_role_type',  label: '非軟體/科技職位 (Not software/tech)' },
    { value: 'other',            label: '其他 (Other)' },
  ];
  const UP_REASONS = [
    { value: 'good_fit',         label: '非常合適 (Very good fit)' },
    { value: 'score_too_low',    label: '分數偏低，應該更高 (Score seems too low)' },
    { value: 'other',            label: '其他 (Other)' },
  ];

  function marketTagClass(m) {
    if (m === 'tw') return 'tag-market-tw';
    if (m === 'jp') return 'tag-market-jp';
    if (m === 'sg') return 'tag-market-sg';
    if (m === 'us') return 'tag-market-us';
    return 'tag-market-unknown';
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit' });
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Load ──────────────────────────────────────────────────

  async function load() {
    const [pipelineRes, matchRes] = await Promise.all([
      fetch('/api/pipeline'),
      fetch('/api/resume/matches'),
    ]);
    const pipelineData = await pipelineRes.json();
    const matchData    = await matchRes.json();

    ALL_ENTRIES  = pipelineData.entries || [];
    PIPELINE_IDS = new Set(ALL_ENTRIES.map(e => e.job_id));
    RESUME_ID    = matchData.resume_id || null;

    // Matches with score >= 80 not yet in pipeline
    ALL_MATCHES = (matchData.matches || []).filter(m =>
      (m.score || 0) >= 80 && !PIPELINE_IDS.has(m.job_id)
    );

    const identity = pipelineData.identity || {};
    if (identity.name) {
      document.getElementById('header-name').textContent = identity.name;
      document.getElementById('header-subtitle').textContent =
        (identity.headline ? identity.headline + ' — ' : '') + 'Job Search Tracker';
    }
    document.getElementById('header-updated').textContent =
      'Updated ' + new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

    updateStats();
    renderRecommended();
    render();
  }

  // ── Recommended section ───────────────────────────────────

  function renderRecommended() {
    const section = document.getElementById('rec-section');
    const badge   = document.getElementById('rec-badge');
    const cards   = document.getElementById('rec-cards');
    const addAll  = document.getElementById('btn-add-all');

    if (!ALL_MATCHES.length) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    badge.textContent = ALL_MATCHES.length;
    addAll.disabled   = false;

    cards.innerHTML = ALL_MATCHES.map(m => {
      const added = PIPELINE_IDS.has(m.job_id);
      return `<div class="rec-card${added ? ' added' : ''}" data-job-id="${escHtml(m.job_id)}">
  <div class="rec-card-body">
    <div class="rec-card-company"><a href="${escHtml(m.url || '#')}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${escHtml(m.company || '—')}</a></div>
    <div class="rec-card-title">${escHtml(m.title || '')}</div>
    <span class="rec-card-score">${m.score}% match</span>
    ${m.explanation ? `<div class="rec-card-expl">${escHtml(m.explanation)}</div>` : ''}
  </div>
  <button class="btn-rec-add${added ? ' added' : ''}" data-job-id="${escHtml(m.job_id)}">${added ? '✓' : '+ Add'}</button>
</div>`;
    }).join('');
  }

  async function addToPipeline(jobId) {
    if (PIPELINE_IDS.has(jobId)) return;
    const match = ALL_MATCHES.find(m => m.job_id === jobId);
    await fetch('/api/pipeline', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        job_id: jobId,
        resume_id: RESUME_ID,
        status: 'recommended',
        verdict: 'recommend',
      }),
    });
    PIPELINE_IDS.add(jobId);
    // Remove from recommendations and add to entries
    ALL_MATCHES = ALL_MATCHES.filter(m => m.job_id !== jobId);
    if (match) {
      ALL_ENTRIES.unshift({
        ...match,
        status: 'recommended',
        verdict: 'recommend',
        added_at: new Date().toISOString(),
      });
    }
    updateStats();
    renderRecommended();
    render();
  }

  document.getElementById('btn-add-all').addEventListener('click', async () => {
    const btn = document.getElementById('btn-add-all');
    btn.disabled = true;
    btn.textContent = 'Adding…';
    for (const m of [...ALL_MATCHES]) {
      await addToPlugin(m.job_id);
    }
    btn.textContent = '+ Add All';
  });

  // Fix typo in above — proper function:
  async function addToPlugin(jobId) { return addToPipeline(jobId); }

  document.getElementById('rec-cards').addEventListener('click', async e => {
    const btn = e.target.closest('.btn-rec-add');
    if (btn && !btn.classList.contains('added')) {
      await addToPlugin(btn.dataset.jobId);
    }
  });

  // ── Stats ─────────────────────────────────────────────────

  function updateStats() {
    const total = ALL_ENTRIES.length;
    const recommended   = ALL_ENTRIES.filter(e => e.status === 'recommended').length;
    const applied       = ALL_ENTRIES.filter(e => e.status === 'applied').length;
    const interviewing  = ALL_ENTRIES.filter(e => e.status === 'interviewing').length;
    const scores = ALL_ENTRIES.map(e => e.score).filter(s => s != null);
    const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : null;

    document.getElementById('stat-total').textContent        = total;
    document.getElementById('stat-recommended').textContent  = recommended;
    document.getElementById('stat-applied').textContent      = applied;
    document.getElementById('stat-interviewing').textContent = interviewing;
    document.getElementById('stat-avg').textContent          = avg != null ? avg + '%' : '—';
  }

  function getFiltered() {
    let entries = [...ALL_ENTRIES];
    if (FILTER !== 'all') entries = entries.filter(e => e.status === FILTER);

    const sort = document.getElementById('sort-sel').value;
    if (sort === 'score-desc') {
      entries.sort((a, b) => (b.score ?? 0) - (a.score ?? 0));
    } else if (sort === 'score-asc') {
      entries.sort((a, b) => (a.score ?? 0) - (b.score ?? 0));
    } else if (sort === 'date-desc') {
      entries.sort((a, b) => (b.added_at || '').localeCompare(a.added_at || ''));
    } else if (sort === 'company') {
      entries.sort((a, b) => (a.company || '').localeCompare(b.company || ''));
    }
    return entries;
  }

  function render() {
    const entries = getFiltered();
    document.getElementById('role-count').textContent = `${entries.length} role${entries.length !== 1 ? 's' : ''}`;

    const tbody = document.getElementById('pipeline-tbody');
    if (!entries.length) {
      tbody.innerHTML = `<tr><td colspan="8"><div class="empty">No entries${FILTER !== 'all' ? ' in this stage' : ''}.<br><a href="/jobs" style="color:#4f8ef7;font-size:0.85rem">Browse Job Board →</a></div></td></tr>`;
      return;
    }

    tbody.innerHTML = entries.map(e => {
      const score    = e.score ?? (e.similarity != null ? Math.round(e.similarity * 100) : null);
      const scoreStr = score != null ? score + '%' : '—';
      const barCls   = score >= 70 ? 'high' : score >= 40 ? 'mid' : 'low';
      const barW     = score != null ? score : 0;

      const market    = (e.market || '').toUpperCase();
      const marketTag = market
        ? `<span class="tag-market ${marketTagClass(e.market)}">${escHtml(market)}</span>` : '—';

      const verdictCls   = e.verdict === 'recommend' ? 'badge-verdict-recommend'
                         : e.verdict === 'pass' ? 'badge-verdict-pass' : 'badge-verdict-none';
      const verdictLabel = e.verdict === 'recommend' ? 'Recommend'
                         : e.verdict === 'pass' ? 'Pass' : '—';

      const tip = e.explanation ? ` title="${escHtml(e.explanation)}"` : '';

      return `<tr data-job-id="${escHtml(e.job_id)}">
  <td class="col-company">
    <div class="company-name"><a href="${escHtml(e.url || '#')}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${escHtml(e.company || '—')}</a></div>
    <div class="role-name">${escHtml(e.title || '')}</div>
  </td>
  <td>${marketTag}</td>
  <td>
    <div class="fit-bar-wrap"${tip}>
      <span class="fit-score">${scoreStr}</span>
      <div class="fit-bar"><div class="fit-bar-fill ${barCls}" style="width:${barW}%"></div></div>
    </div>
  </td>
  <td><span class="badge-verdict ${verdictCls}">${verdictLabel}</span></td>
  <td>
    <select class="status-sel" data-job-id="${escHtml(e.job_id)}">
      <option value="recommended"  ${e.status === 'recommended'  ? 'selected' : ''}>Recommended</option>
      <option value="applied"      ${e.status === 'applied'      ? 'selected' : ''}>Applied</option>
      <option value="interviewing" ${e.status === 'interviewing' ? 'selected' : ''}>Interviewing</option>
      <option value="pass"         ${e.status === 'pass'         ? 'selected' : ''}>Pass</option>
    </select>
  </td>
  <td>
    <textarea class="notes-input" rows="1" data-job-id="${escHtml(e.job_id)}" placeholder="Add notes…">${escHtml(e.notes || '')}</textarea>
  </td>
  <td class="col-date">${fmtDate(e.added_at)}</td>
  <td>
    <div style="display:flex;align-items:center;gap:4px">
      <div class="feedback-btns">
        <button class="btn-feedback${e._fb === 'up' ? ' up' : ''}" data-action="feedback-up" data-job-id="${escHtml(e.job_id)}" title="Score too low">👍</button>
        <button class="btn-feedback${e._fb === 'down' ? ' down' : ''}" data-action="feedback-down" data-job-id="${escHtml(e.job_id)}" title="Score too high">👎</button>
      </div>
      <button class="btn-remove" data-job-id="${escHtml(e.job_id)}" title="Remove">×</button>
    </div>
  </td>
</tr>`;
    }).join('');
  }

  // ── Event delegation ──────────────────────────────────────

  document.getElementById('pipeline-tbody').addEventListener('change', async e => {
    const sel = e.target.closest('.status-sel');
    if (sel) {
      const jobId = sel.dataset.jobId;
      await fetch(`/api/pipeline/${encodeURIComponent(jobId)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: sel.value }),
      });
      const entry = ALL_ENTRIES.find(x => x.job_id === jobId);
      if (entry) entry.status = sel.value;
      updateStats();
      if (FILTER !== 'all') render();
    }
  });

  document.getElementById('pipeline-tbody').addEventListener('blur', async e => {
    const ta = e.target.closest('.notes-input');
    if (ta) {
      const jobId = ta.dataset.jobId;
      await fetch(`/api/pipeline/${encodeURIComponent(jobId)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ notes: ta.value }),
      });
      const entry = ALL_ENTRIES.find(x => x.job_id === jobId);
      if (entry) entry.notes = ta.value;
    }
  }, true);

  document.getElementById('pipeline-tbody').addEventListener('click', async e => {
    const removeBtn = e.target.closest('.btn-remove');
    if (removeBtn) {
      const jobId = removeBtn.dataset.jobId;
      await fetch(`/api/pipeline/${encodeURIComponent(jobId)}`, { method: 'DELETE' });
      ALL_ENTRIES = ALL_ENTRIES.filter(x => x.job_id !== jobId);
      PIPELINE_IDS.delete(jobId);
      updateStats();
      render();
      return;
    }

    // Feedback buttons
    const fbBtn = e.target.closest('[data-action^="feedback-"]');
    if (fbBtn) {
      const rating = fbBtn.dataset.action === 'feedback-up' ? 'up' : 'down';
      openFeedbackModal(fbBtn.dataset.jobId, rating);
    }
  });

  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      FILTER = t.dataset.filter;
      render();
    });
  });

  document.getElementById('sort-sel').addEventListener('change', render);

  // ── Feedback modal ────────────────────────────────────────

  function openFeedbackModal(jobId, rating) {
    _fbJob    = jobId;
    _fbRating = rating;

    const title   = document.getElementById('feedback-title');
    const reasons = document.getElementById('feedback-reasons');
    title.textContent = rating === 'down'
      ? '👎 Why was this score too high?'
      : '👍 Why was this score too low?';

    const list = rating === 'down' ? DOWN_REASONS : UP_REASONS;
    reasons.innerHTML = list.map(r => `
      <label class="modal-reason">
        <input type="radio" name="fb-reason" value="${escHtml(r.value)}">
        ${escHtml(r.label)}
      </label>
    `).join('');

    // Select first option by default
    const first = reasons.querySelector('input[type=radio]');
    if (first) { first.checked = true; first.closest('.modal-reason').classList.add('selected'); }

    reasons.querySelectorAll('.modal-reason').forEach(el => {
      el.addEventListener('click', () => {
        reasons.querySelectorAll('.modal-reason').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      });
    });

    document.getElementById('feedback-modal').classList.remove('hidden');
  }

  document.getElementById('feedback-cancel').addEventListener('click', () => {
    document.getElementById('feedback-modal').classList.add('hidden');
    _fbJob = _fbRating = null;
  });

  document.getElementById('feedback-confirm').addEventListener('click', async () => {
    const selected = document.querySelector('input[name=fb-reason]:checked');
    const reason   = selected ? selected.value : null;

    document.getElementById('feedback-modal').classList.add('hidden');

    if (!_fbJob) return;
    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        job_id:    _fbJob,
        rating:    _fbRating,
        reason:    reason,
        resume_id: RESUME_ID,
      }),
    });

    // Mark feedback on entry (optimistic)
    const entry = ALL_ENTRIES.find(x => x.job_id === _fbJob);
    if (entry) entry._fb = _fbRating;
    render();

    _fbJob = _fbRating = null;
  });

  // Close modal on overlay click
  document.getElementById('feedback-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.add('hidden');
      _fbJob = _fbRating = null;
    }
  });

  load();
</script>

</body>
</html>
