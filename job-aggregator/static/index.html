<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f6f9;
    color: #1a1a2e;
    min-height: 100vh;
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  header {
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  header h1 { font-size: 1.15rem; font-weight: 700; color: #1a1a2e; white-space: nowrap; }
  header h1 span { color: #4f8ef7; }

  #search {
    flex: 1;
    max-width: 420px;
    padding: 8px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: #4f8ef7; }

  #stats-bar {
    margin-left: auto;
    font-size: 0.8rem;
    color: #6b7280;
    white-space: nowrap;
  }

  /* ── Layout ──────────────────────────────────────────────── */
  .layout {
    display: flex;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* ── Sidebar filters ─────────────────────────────────────── */
  aside {
    flex: 0 0 200px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .filter-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 16px;
  }
  .filter-card h3 {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: #9ca3af;
    margin-bottom: 10px;
  }

  .filter-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    cursor: pointer;
    font-size: 0.875rem;
    color: #374151;
    user-select: none;
  }
  .filter-option input[type=checkbox],
  .filter-option input[type=radio] {
    accent-color: #4f8ef7;
    width: 15px; height: 15px;
    cursor: pointer;
  }
  .filter-option .count {
    margin-left: auto;
    font-size: 0.75rem;
    color: #9ca3af;
  }

  .sort-select {
    width: 100%;
    padding: 6px 8px;
    border: 1.5px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.85rem;
    background: #fff;
    cursor: pointer;
    outline: none;
  }
  .sort-select:focus { border-color: #4f8ef7; }

  /* ── Main content ────────────────────────────────────────── */
  main { flex: 1; min-width: 0; }

  #result-count {
    font-size: 0.82rem;
    color: #6b7280;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── Job card ────────────────────────────────────────────── */
  .job-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 10px;
    transition: box-shadow .12s, border-color .12s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }
  .job-card:hover {
    box-shadow: 0 3px 12px rgba(0,0,0,.09);
    border-color: #c7d7fd;
  }

  .logo {
    flex: 0 0 40px;
    width: 40px; height: 40px;
    border-radius: 6px;
    object-fit: contain;
    border: 1px solid #f0f0f0;
    background: #f9fafb;
  }
  .logo-placeholder {
    flex: 0 0 40px;
    width: 40px; height: 40px;
    border-radius: 6px;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: #d1d5db;
  }

  .job-body { flex: 1; min-width: 0; }

  .job-header {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 3px;
  }

  .job-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: #1a1a2e;
    text-decoration: none;
  }
  .job-title:hover { color: #4f8ef7; text-decoration: underline; }

  .badge-new {
    font-size: 0.65rem;
    font-weight: 700;
    background: #dcfce7;
    color: #16a34a;
    padding: 2px 6px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .job-meta {
    font-size: 0.82rem;
    color: #6b7280;
    margin-bottom: 6px;
  }
  .job-meta .company { font-weight: 500; color: #374151; }
  .job-meta .sep { margin: 0 5px; color: #d1d5db; }

  .job-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }

  .tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-market-tw { background: #fef3c7; color: #92400e; }
  .tag-market-jp { background: #fee2e2; color: #991b1b; }
  .tag-market-sg { background: #dbeafe; color: #1e40af; }
  .tag-market-us { background: #d1fae5; color: #065f46; }
  .tag-market-unknown { background: #f3f4f6; color: #6b7280; }

  .tag-source {
    background: #f3f4f6;
    color: #6b7280;
  }

  .tag-date {
    background: transparent;
    color: #9ca3af;
    padding-left: 0;
    font-size: 0.72rem;
  }

  /* ── Match badge ─────────────────────────────────────────── */
  .badge-match {
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    cursor: default;
    white-space: nowrap;
  }
  .badge-match-high  { background: #dcfce7; color: #15803d; }
  .badge-match-mid   { background: #fef9c3; color: #a16207; }
  .badge-match-low   { background: #f3f4f6; color: #6b7280; }

  /* ── Resume upload card ──────────────────────────────────── */
  .resume-upload-btn {
    display: block;
    text-align: center;
    padding: 7px 10px;
    border: 1.5px dashed #d1d5db;
    border-radius: 7px;
    font-size: 0.82rem;
    color: #4f8ef7;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .resume-upload-btn:hover { border-color: #4f8ef7; background: #f0f6ff; }

  .resume-status {
    font-size: 0.78rem;
    color: #6b7280;
    margin-top: 6px;
    min-height: 1em;
  }
  .resume-status.processing { color: #d97706; }
  .resume-status.done       { color: #16a34a; }
  .resume-status.error      { color: #dc2626; }

  .resume-clear-btn {
    margin-top: 6px;
    font-size: 0.75rem;
    color: #9ca3af;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }
  .resume-clear-btn:hover { color: #6b7280; }

  /* ── Empty state ─────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
  }
  .empty .icon { font-size: 3rem; margin-bottom: 12px; }
  .empty p { font-size: 0.95rem; }

  /* ── Loading ─────────────────────────────────────────────── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #9ca3af;
    font-size: 0.9rem;
  }

  #pipeline-nav {
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    color: #4f8ef7;
    white-space: nowrap;
    padding: 6px 12px;
    border: 1.5px solid #4f8ef7;
    border-radius: 7px;
    transition: background .15s;
  }
  #pipeline-nav:hover { background: #f0f6ff; }
  .header-nav-link {
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    color: #6b7280;
    white-space: nowrap;
    padding: 6px 12px;
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    transition: background .15s, border-color .15s;
  }
  .header-nav-link:hover { background: #f9fafb; border-color: #9ca3af; color: #374151; }
  #pipeline-nav span {
    background: #4f8ef7;
    color: #fff;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 0.72rem;
    margin-left: 4px;
  }

  .btn-pipeline {
    flex: 0 0 auto;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 6px;
    font-size: 1rem;
    color: #9ca3af;
    width: 30px; height: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .12s, color .12s, background .12s;
    align-self: center;
  }
  .btn-pipeline:hover { border-color: #4f8ef7; color: #4f8ef7; background: #f0f6ff; }
  .btn-pipeline.in-pipeline { border-color: #4f8ef7; color: #4f8ef7; background: #f0f6ff; }

  .btn-match-job {
    flex: 0 0 auto;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 6px;
    font-size: 0.78rem;
    color: #9ca3af;
    width: 30px; height: 30px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .12s, color .12s, background .12s;
    align-self: center;
  }
  .btn-match-job:hover { border-color: #4f8ef7; color: #4f8ef7; background: #f0f6ff; }
  .btn-match-job.running { border-color: #d97706; color: #d97706; background: #fffbeb; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Refresh button ── */
  #btn-refresh {
    padding: 6px 14px;
    border: 1.5px solid #e5e7eb;
    border-radius: 7px;
    background: #fff;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color .12s, background .12s;
    color: #374151;
  }
  #btn-refresh:hover:not(:disabled) { border-color: #9ca3af; background: #f9fafb; }
  #btn-refresh:disabled { color: #9ca3af; cursor: default; }

  /* ── Import button ── */
  #btn-import {
    padding: 6px 14px;
    border: 1.5px solid #4f8ef7;
    border-radius: 7px;
    background: #fff;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    color: #4f8ef7;
    transition: background .12s;
  }
  #btn-import:hover { background: #f0f6ff; }

  /* ── Feedback buttons on cards ── */
  .feedback-btns { display: flex; gap: 3px; }
  .btn-fb {
    background: none;
    border: 1px solid #e5e7eb;
    border-radius: 5px;
    font-size: 0.75rem;
    padding: 1px 6px;
    cursor: pointer;
    color: #d1d5db;
    transition: background .12s, border-color .12s, color .12s;
  }
  .btn-fb:hover { border-color: #9ca3af; color: #374151; background: #f9fafb; }
  .btn-fb.up   { border-color: #86efac; color: #16a34a; background: #f0fdf4; }
  .btn-fb.down { border-color: #fca5a5; color: #dc2626; background: #fff1f2; }

  /* ── Import & Feedback modals ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px 28px;
    width: 420px;
    max-width: 96vw;
    box-shadow: 0 8px 32px rgba(0,0,0,.18);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 0.78rem; font-weight: 600; color: #6b7280; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .modal-field input, .modal-field textarea, .modal-field select {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #d1d5db;
    border-radius: 7px;
    font-size: 0.88rem;
    font-family: inherit;
    outline: none;
    transition: border-color .12s;
  }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color: #4f8ef7; }
  .modal-field textarea { resize: vertical; min-height: 80px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .btn-modal-cancel {
    padding: 7px 18px; border: 1.5px solid #e5e7eb; border-radius: 7px;
    background: #fff; font-size: 0.85rem; cursor: pointer;
  }
  .btn-modal-cancel:hover { background: #f9fafb; }
  .btn-modal-primary {
    padding: 7px 18px; border: none; border-radius: 7px;
    background: #1a1a2e; color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  }
  .btn-modal-primary:hover { background: #2d2d4e; }
  .btn-modal-primary:disabled { background: #9ca3af; cursor: default; }
  .modal-status { font-size: 0.82rem; color: #6b7280; margin-top: 8px; min-height: 1.2em; }
  .modal-status.ok  { color: #16a34a; }
  .modal-status.err { color: #dc2626; }

  .modal-reasons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .modal-reason {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border: 1.5px solid #e5e7eb; border-radius: 7px;
    cursor: pointer; font-size: 0.85rem; transition: border-color .12s, background .12s;
  }
  .modal-reason:hover { border-color: #9ca3af; background: #f9fafb; }
  .modal-reason.selected { border-color: #4f8ef7; background: #f0f6ff; }
  .modal-reason input[type=radio] { accent-color: #4f8ef7; }

  @media (max-width: 640px) {
    aside { display: none; }
    .layout { padding: 12px 10px; }
    header { flex-wrap: wrap; gap: 10px; }
    #search { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>Job <span>Board</span></h1>
  <input id="search" type="search" placeholder="Search title, company…" autocomplete="off">
  <div id="stats-bar">loading…</div>
  <button id="btn-import" title="Add a job by URL">+ Import URL</button>
  <button id="btn-refresh" title="Re-fetch all job sources">⟳ Refresh</button>
  <a href="/review" class="header-nav-link">👀 Review</a>
  <a href="/pipeline" id="pipeline-nav">Pipeline <span id="pipeline-count"></span></a>
  <a href="/coach" class="header-nav-link">💬 Coach</a>
</header>

<!-- ── CakeResume Auth Modal ── -->
<div class="modal-overlay hidden" id="cake-auth-modal">
  <div class="modal" style="max-width:420px">
    <h3>🍰 CakeResume Session Expired</h3>
    <p style="margin:12px 0 8px;color:#6b7280;font-size:0.88rem">
      Your CakeResume login has expired. Click <strong>Re-authenticate</strong> to open a browser window and log back in.
    </p>
    <p id="cake-auth-status" style="font-size:0.82rem;color:#6b7280;min-height:1.2em"></p>
    <div class="modal-btns" style="margin-top:16px">
      <button class="btn-cancel" id="cake-auth-dismiss">Dismiss</button>
      <button class="btn-confirm" id="cake-auth-btn">🔑 Re-authenticate</button>
    </div>
  </div>
</div>

<!-- ── Import URL Modal ── -->
<div class="modal-overlay hidden" id="import-modal">
  <div class="modal">
    <h3>Import Job from URL</h3>
    <div class="modal-field">
      <label>Job Posting URL</label>
      <input type="url" id="import-url" placeholder="https://www.104.com.tw/job/..." autocomplete="off">
    </div>
    <div id="import-preview" style="display:none">
      <div class="modal-field">
        <label>Job Title</label>
        <input type="text" id="import-title">
      </div>
      <div class="modal-field">
        <label>Company</label>
        <input type="text" id="import-company">
      </div>
      <div style="display:flex;gap:12px">
        <div class="modal-field" style="flex:1">
          <label>Location</label>
          <input type="text" id="import-location">
        </div>
        <div class="modal-field" style="flex:0 0 100px">
          <label>Market</label>
          <select id="import-market">
            <option value="">—</option>
            <option value="tw">TW</option>
            <option value="jp">JP</option>
            <option value="sg">SG</option>
            <option value="us">US</option>
          </select>
        </div>
      </div>
      <div class="modal-field">
        <label>Description</label>
        <textarea id="import-description" rows="4"></textarea>
      </div>
    </div>
    <div class="modal-status" id="import-status"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" id="import-cancel">Cancel</button>
      <button class="btn-modal-primary" id="import-fetch">Fetch & Parse</button>
    </div>
  </div>
</div>

<!-- ── Feedback Modal ── -->
<div class="modal-overlay hidden" id="feedback-modal">
  <div class="modal" style="width:360px">
    <h3 id="feedback-modal-title">Why was this score off?</h3>
    <div class="modal-reasons" id="feedback-modal-reasons"></div>
    <div class="modal-btns">
      <button class="btn-modal-cancel" id="feedback-cancel">Cancel</button>
      <button class="btn-modal-primary" id="feedback-confirm">Submit</button>
    </div>
  </div>
</div>

<div class="layout">

  <aside>
    <!-- Market filter -->
    <div class="filter-card">
      <h3>Market</h3>
      <div id="market-filters"></div>
    </div>

    <!-- Source filter -->
    <div class="filter-card">
      <h3>Source</h3>
      <div id="source-filters"></div>
    </div>

    <!-- Date added -->
    <div class="filter-card">
      <h3>Date Added</h3>
      <label class="filter-option"><input type="radio" name="days" value="0" checked> All time</label>
      <label class="filter-option"><input type="radio" name="days" value="1"> Last 24 h</label>
      <label class="filter-option"><input type="radio" name="days" value="7"> Last 7 days</label>
      <label class="filter-option"><input type="radio" name="days" value="30"> Last 30 days</label>
    </div>

    <!-- Sort -->
    <div class="filter-card">
      <h3>Sort by</h3>
      <select id="sort-select" class="sort-select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title">Title A→Z</option>
        <option value="company">Company A→Z</option>
        <option value="best-match" id="sort-best-match" disabled>Best match</option>
      </select>
    </div>

    <!-- Resume match -->
    <div class="filter-card">
      <h3>Resume Match</h3>
      <label class="resume-upload-btn">
        <input type="file" id="resume-input" accept=".pdf" style="display:none">
        📄 Upload PDF
      </label>
      <button id="resume-rematch" style="display:none;margin-top:8px;width:100%;padding:6px 0;border:1.5px solid #4f8ef7;border-radius:7px;background:#fff;color:#4f8ef7;font-size:0.82rem;font-weight:600;cursor:pointer;" title="Re-run match scores against all current jobs">⟳ Run Match Score</button>
      <div id="resume-status" class="resume-status"></div>
      <button id="resume-clear" class="resume-clear-btn" style="display:none">Clear resume</button>
    </div>
  </aside>

  <main>
    <div id="result-count"></div>
    <div id="job-list"><div class="loading">Loading jobs…</div></div>
  </main>

</div>

<script>
  let ALL_JOBS = [];
  let NEWEST_JOB_TIME = 0;
  const NOW = Date.now();

  // ── Resume match state ────────────────────────────────────
  let MATCH_DATA = {};        // { job_id: { score, similarity, explanation } }
  let RESUME_ID  = null;
  let RESUME_STATUS = 'none'; // none | processing | done | error:…
  let _pollTimer = null;

  // ── Pipeline state ────────────────────────────────────────
  let PIPELINE_IDS = new Set();

  // ── Feedback state ────────────────────────────────────────
  let FEEDBACK_STATE = {};  // { job_id: { rating } }
  let _fbJob = null, _fbRating = null;

  async function loadPipelineIds() {
    try {
      const res = await fetch('/api/pipeline/ids');
      const data = await res.json();
      PIPELINE_IDS = new Set(data.ids || []);
      document.getElementById('pipeline-count').textContent = PIPELINE_IDS.size || '';
    } catch (e) {}
  }

  async function togglePipeline(jobId) {
    if (PIPELINE_IDS.has(jobId)) {
      await fetch(`/api/pipeline/${encodeURIComponent(jobId)}`, { method: 'DELETE' });
      PIPELINE_IDS.delete(jobId);
    } else {
      await fetch('/api/pipeline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_id: jobId, resume_id: RESUME_ID, status: 'recommended' }),
      });
      PIPELINE_IDS.add(jobId);
    }
    document.getElementById('pipeline-count').textContent = PIPELINE_IDS.size || '';
    renderJobs();
  }

  // ── Fetch data ────────────────────────────────────────────
  async function loadJobs() {
    try {
      const res = await fetch('/api/jobs');
      ALL_JOBS = await res.json();
      NEWEST_JOB_TIME = Math.max(...ALL_JOBS.map(j => j.first_seen_at ? new Date(j.first_seen_at).getTime() : 0));
      buildFilters();
      renderJobs();
    } catch (e) {
      document.getElementById('job-list').innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><p>Failed to load jobs. Is the server running?</p></div>';
    }
  }

  // ── Build dynamic filter checkboxes ───────────────────────
  function buildFilters() {
    const markets = [...new Set(ALL_JOBS.map(j => j.market).filter(Boolean))].sort();
    const sources = [...new Set(ALL_JOBS.flatMap(j => j.sources || []))].sort();

    const mkCounts = {};
    const srcCounts = {};
    ALL_JOBS.forEach(j => {
      if (j.market) mkCounts[j.market] = (mkCounts[j.market] || 0) + 1;
      (j.sources || []).forEach(s => { srcCounts[s] = (srcCounts[s] || 0) + 1; });
    });

    document.getElementById('market-filters').innerHTML = markets.map(m =>
      `<label class="filter-option">
        <input type="checkbox" class="mkt-cb" value="${m}" checked>
        ${m.toUpperCase()}
        <span class="count">${mkCounts[m] || 0}</span>
      </label>`
    ).join('');

    document.getElementById('source-filters').innerHTML = sources.map(s =>
      `<label class="filter-option">
        <input type="checkbox" class="src-cb" value="${s}" checked>
        ${s}
        <span class="count">${srcCounts[s] || 0}</span>
      </label>`
    ).join('');

    // Stats bar
    document.getElementById('stats-bar').textContent =
      `${ALL_JOBS.length} total · ${markets.join(' / ')}`;

    // Attach events
    document.querySelectorAll('.mkt-cb, .src-cb').forEach(cb =>
      cb.addEventListener('change', renderJobs)
    );
  }

  // ── Get current filter state ──────────────────────────────
  function getFilters() {
    const q = document.getElementById('search').value.toLowerCase().trim();

    const markets = [...document.querySelectorAll('.mkt-cb:checked')].map(c => c.value);
    const sources = [...document.querySelectorAll('.src-cb:checked')].map(c => c.value);

    const daysVal = document.querySelector('input[name=days]:checked')?.value || '0';
    const days = parseInt(daysVal, 10);

    const sort = document.getElementById('sort-select').value;

    return { q, markets, sources, days, sort };
  }

  // ── Filter + sort ─────────────────────────────────────────
  function applyFilters(jobs, { q, markets, sources, days, sort }) {
    let filtered = jobs;

    if (markets.length) {
      filtered = filtered.filter(j => markets.includes(j.market));
    }

    if (sources.length) {
      filtered = filtered.filter(j =>
        (j.sources || []).some(s => sources.includes(s))
      );
    }

    if (days > 0) {
      const cutoff = NOW - days * 86400 * 1000;
      filtered = filtered.filter(j => {
        if (!j.first_seen_at) return true;
        return new Date(j.first_seen_at).getTime() >= cutoff;
      });
    }

    if (q) {
      filtered = filtered.filter(j =>
        (j.title || '').toLowerCase().includes(q) ||
        (j.company || '').toLowerCase().includes(q)
      );
    }

    // Sort
    filtered = [...filtered];
    if (sort === 'newest') {
      filtered.sort((a, b) => (b.first_seen_at || '').localeCompare(a.first_seen_at || ''));
    } else if (sort === 'oldest') {
      filtered.sort((a, b) => (a.first_seen_at || '').localeCompare(b.first_seen_at || ''));
    } else if (sort === 'title') {
      filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
    } else if (sort === 'company') {
      filtered.sort((a, b) => (a.company || '').localeCompare(b.company || ''));
    } else if (sort === 'best-match') {
      filtered.sort((a, b) => {
        const sa = MATCH_DATA[a.id]?.score ?? Math.round((MATCH_DATA[a.id]?.similarity ?? 0) * 100);
        const sb = MATCH_DATA[b.id]?.score ?? Math.round((MATCH_DATA[b.id]?.similarity ?? 0) * 100);
        return sb - sa;
      });
    }

    return filtered;
  }

  // ── Render ────────────────────────────────────────────────
  function isNew(job) {
    if (!job.first_seen_at) return false;
    return new Date(job.first_seen_at).getTime() === NEWEST_JOB_TIME;
  }

  function marketTagClass(market) {
    const m = (market || '').toLowerCase();
    if (m === 'tw') return 'tag-market-tw';
    if (m === 'jp') return 'tag-market-jp';
    if (m === 'sg') return 'tag-market-sg';
    if (m === 'us') return 'tag-market-us';
    return 'tag-market-unknown';
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const diff = Math.floor((NOW - d.getTime()) / 1000);
    if (diff < 3600)   return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400)  return `${Math.floor(diff / 3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderCard(job) {
    const newBadge = isNew(job) ? '<span class="badge-new">New</span>' : '';

    const m = MATCH_DATA[job.id];
    let matchBadge = '';
    if (m) {
      const pct = m.score ?? Math.round((m.similarity ?? 0) * 100);
      const cls = pct >= 70 ? 'badge-match-high' : pct >= 40 ? 'badge-match-mid' : 'badge-match-low';
      const tip = m.explanation ? ` title="${escHtml(m.explanation)}"` : '';
      matchBadge = `<span class="badge-match ${cls}"${tip}>${pct}% match</span>`;
    }

    const logoHtml = job.logo_url
      ? `<img class="logo" src="${escHtml(job.logo_url)}" alt="" loading="lazy">`
      : `<div class="logo-placeholder">🏢</div>`;

    const market = (job.market || '').toUpperCase();
    const marketTag = market
      ? `<span class="tag ${marketTagClass(job.market)}">${escHtml(market)}</span>`
      : '';

    const sourceTags = (job.sources || []).map(s =>
      `<span class="tag tag-source">${escHtml(s)}</span>`
    ).join('');

    const dateStr = fmtDate(job.first_seen_at);
    const dateTag = dateStr ? `<span class="tag tag-date">${escHtml(dateStr)}</span>` : '';

    const company = job.company ? `<span class="company">${escHtml(job.company)}</span>` : '';
    const location = job.location ? `<span class="sep">·</span>${escHtml(job.location)}` : '';

    const inPipeline = PIPELINE_IDS.has(job.id);
    const pipelineBtn = `<button class="btn-pipeline${inPipeline ? ' in-pipeline' : ''}" data-id="${escHtml(job.id)}" title="${inPipeline ? 'Remove from pipeline' : 'Add to pipeline'}">${inPipeline ? '✓' : '+'}</button>`;

    const matchBtn = RESUME_ID
      ? `<button class="btn-match-job" data-match-id="${escHtml(job.id)}" title="Run match score for this job">⟳</button>`
      : '';

    const fbState = FEEDBACK_STATE[job.id] || {};
    const fbBtns = m ? `
<div class="feedback-btns">
  <button class="btn-fb${fbState.rating === 'up' ? ' up' : ''}" data-fb="up" data-id="${escHtml(job.id)}" title="Score too low / good fit">👍</button>
  <button class="btn-fb${fbState.rating === 'down' ? ' down' : ''}" data-fb="down" data-id="${escHtml(job.id)}" title="Score too high">👎</button>
</div>` : '';

    return `
<div class="job-card">
  ${logoHtml}
  <div class="job-body">
    <div class="job-header">
      <a class="job-title" href="${escHtml(job.url || '#')}" target="_blank" rel="noopener">
        ${escHtml(job.title || '—')}
      </a>
      ${newBadge}
      ${matchBadge}
    </div>
    <div class="job-meta">${company}${location}</div>
    <div class="job-tags">
      ${marketTag}
      ${sourceTags}
      ${dateTag}
      ${fbBtns}
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:4px;align-items:center">
    ${pipelineBtn}
    ${matchBtn}
  </div>
</div>`;
  }

  function renderJobs() {
    const filters = getFilters();
    const filtered = applyFilters(ALL_JOBS, filters);

    document.getElementById('result-count').textContent =
      `${filtered.length} job${filtered.length !== 1 ? 's' : ''}` +
      (filtered.length < ALL_JOBS.length ? ` of ${ALL_JOBS.length}` : '');

    // Update sidebar counts to reflect currently visible jobs
    const mkCounts = {}, srcCounts = {};
    filtered.forEach(j => {
      if (j.market) mkCounts[j.market] = (mkCounts[j.market] || 0) + 1;
      (j.sources || []).forEach(s => { srcCounts[s] = (srcCounts[s] || 0) + 1; });
    });
    document.querySelectorAll('.mkt-cb').forEach(cb => {
      const el = cb.closest('label').querySelector('.count');
      if (el) el.textContent = mkCounts[cb.value] || 0;
    });
    document.querySelectorAll('.src-cb').forEach(cb => {
      const el = cb.closest('label').querySelector('.count');
      if (el) el.textContent = srcCounts[cb.value] || 0;
    });

    const container = document.getElementById('job-list');
    if (!filtered.length) {
      container.innerHTML = `
<div class="empty">
  <div class="icon">🔍</div>
  <p>No jobs match your filters.</p>
</div>`;
      return;
    }

    container.innerHTML = filtered.map(renderCard).join('');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Resume upload + polling ───────────────────────────────

  function _resumeStatusEl()  { return document.getElementById('resume-status'); }
  function _resumeClearBtn()  { return document.getElementById('resume-clear'); }
  function _resumeRematchBtn(){ return document.getElementById('resume-rematch'); }
  function _sortBestMatch()   { return document.getElementById('sort-best-match'); }

  function updateResumeUI() {
    const el        = _resumeStatusEl();
    const clearBtn  = _resumeClearBtn();
    const rematchBtn= _resumeRematchBtn();
    const bestOpt   = _sortBestMatch();
    if (!el) return;

    el.className = 'resume-status';
    if (RESUME_STATUS === 'none') {
      el.textContent = '';
      clearBtn.style.display = 'none';
      rematchBtn.style.display = 'none';
      if (bestOpt) bestOpt.disabled = true;
    } else if (RESUME_STATUS === 'processing' || RESUME_STATUS === 'pending') {
      el.textContent = 'Analyzing résumé…';
      el.classList.add('processing');
      clearBtn.style.display = 'block';
      rematchBtn.style.display = 'none';
      if (bestOpt) bestOpt.disabled = true;
    } else if (RESUME_STATUS === 'done') {
      const n = Object.values(MATCH_DATA).filter(m => m.score != null).length;
      el.textContent = `Matched ${n} jobs`;
      el.classList.add('done');
      clearBtn.style.display = 'block';
      rematchBtn.style.display = 'block';
      rematchBtn.disabled = false;
      rematchBtn.textContent = '⟳ Run Match Score';
      if (bestOpt) bestOpt.disabled = false;
    } else {
      const errDetail = RESUME_STATUS.startsWith('error:')
        ? RESUME_STATUS.slice(6).trim()
        : RESUME_STATUS;
      el.textContent = errDetail ? `Error: ${errDetail}` : 'Error — try re-uploading';
      el.classList.add('error');
      clearBtn.style.display = 'block';
      rematchBtn.style.display = 'none';
      if (bestOpt) bestOpt.disabled = true;
    }
  }

  async function fetchMatches() {
    if (!RESUME_ID) return;
    try {
      const res  = await fetch(`/api/resume/matches?resume_id=${RESUME_ID}`);
      const data = await res.json();
      RESUME_STATUS = data.status || 'none';
      MATCH_DATA = {};
      for (const m of data.matches || []) {
        MATCH_DATA[m.job_id] = { score: m.score, similarity: m.similarity, explanation: m.explanation };
      }
      if (RESUME_STATUS === 'done') {
        loadPipelineIds();
      }
      updateResumeUI();
      renderJobs();
      if (RESUME_STATUS !== 'processing' && RESUME_STATUS !== 'pending') {
        clearInterval(_pollTimer);
        _pollTimer = null;
      }
    } catch (e) { /* network hiccup — keep polling */ }
  }

  async function uploadResume(file) {
    const formData = new FormData();
    formData.append('file', file);
    RESUME_STATUS = 'processing';
    updateResumeUI();
    try {
      const res  = await fetch('/api/resume/upload', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Upload failed');
      RESUME_ID = data.resume_id;
      // Start polling every 4 s
      if (_pollTimer) clearInterval(_pollTimer);
      _pollTimer = setInterval(fetchMatches, 4000);
      fetchMatches();
    } catch (e) {
      RESUME_STATUS = 'error: ' + (e.message || 'Upload failed');
      updateResumeUI();
    }
  }

  function clearResume() {
    if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
    RESUME_ID = null;
    RESUME_STATUS = 'none';
    MATCH_DATA = {};
    // If currently sorted by best-match, switch back to newest
    const sel = document.getElementById('sort-select');
    if (sel && sel.value === 'best-match') sel.value = 'newest';
    updateResumeUI();
    renderJobs();
  }

  // ── Wire up events ────────────────────────────────────────
  document.getElementById('search').addEventListener('input', renderJobs);
  document.getElementById('sort-select').addEventListener('change', renderJobs);
  document.querySelectorAll('input[name=days]').forEach(r =>
    r.addEventListener('change', renderJobs)
  );
  document.getElementById('resume-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) uploadResume(file);
    e.target.value = ''; // allow re-uploading same file
  });
  document.getElementById('resume-clear').addEventListener('click', clearResume);

  document.getElementById('resume-rematch').addEventListener('click', async () => {
    const btn = _resumeRematchBtn();
    btn.disabled = true;
    btn.textContent = '⟳ Running…';
    try {
      const res  = await fetch('/api/resume/rematch', { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Failed');
      RESUME_ID     = data.resume_id;
      RESUME_STATUS = 'processing';
      updateResumeUI();
      if (_pollTimer) clearInterval(_pollTimer);
      _pollTimer = setInterval(fetchMatches, 4000);
      fetchMatches();
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '⟳ Run Match Score';
      _resumeStatusEl().textContent = 'Error: ' + e.message;
      _resumeStatusEl().className = 'resume-status error';
    }
  });

  document.getElementById('job-list').addEventListener('click', async e => {
    const pBtn = e.target.closest('.btn-pipeline');
    if (pBtn) { togglePipeline(pBtn.dataset.id); return; }

    const fbBtn = e.target.closest('.btn-fb');
    if (fbBtn) { openFeedbackModal(fbBtn.dataset.id, fbBtn.dataset.fb); return; }

    const mBtn = e.target.closest('.btn-match-job');
    if (mBtn && !mBtn.classList.contains('running')) {
      const jobId = mBtn.dataset.matchId;
      mBtn.classList.add('running');
      mBtn.title = 'Scoring…';
      try {
        await fetch(`/api/jobs/${encodeURIComponent(jobId)}/match`, { method: 'POST' });
        // Poll until this job's score appears
        let tries = 0;
        const poll = setInterval(async () => {
          tries++;
          const res  = await fetch(`/api/resume/matches?resume_id=${RESUME_ID}`);
          const data = await res.json();
          const hit  = (data.matches || []).find(m => m.job_id === jobId && m.score != null);
          if (hit || tries > 20) {
            clearInterval(poll);
            mBtn.classList.remove('running');
            mBtn.title = 'Run match score for this job';
            if (hit) {
              MATCH_DATA[jobId] = { score: hit.score, similarity: hit.similarity, explanation: hit.explanation };
              renderJobs();
            }
          }
        }, 3000);
      } catch(e) {
        mBtn.classList.remove('running');
      }
    }
  });

  // ── Refresh jobs ──────────────────────────────────────────
  let _refreshPoll = null;

  async function startRefresh() {
    const btn = document.getElementById('btn-refresh');
    btn.disabled = true;
    btn.textContent = '⟳ Updating…';
    await fetch('/api/jobs/refresh', { method: 'POST' });
    _refreshPoll = setInterval(async () => {
      try {
        const res  = await fetch('/api/jobs/refresh/status');
        const data = await res.json();
        if (!data.running) {
          clearInterval(_refreshPoll);
          _refreshPoll = null;
          btn.disabled = false;
          const n = data.new_count;
          btn.textContent = n > 0 ? `⟳ +${n} new` : '⟳ Refresh';
          if (n > 0) {
            setTimeout(() => { btn.textContent = '⟳ Refresh'; }, 5000);
            await loadJobs();
          }
          if (data.error) btn.textContent = '⟳ Error';
          if (data.cakeresume_auth_needed) {
            if (document.getElementById('cake-auth-modal').classList.contains('hidden'))
              showCakeAuthModal();
          }
        }
      } catch(e) {}
    }, 3000);
  }

  document.getElementById('btn-refresh').addEventListener('click', startRefresh);

  // ── CakeResume Auth Modal ──────────────────────────────────

  function showCakeAuthModal() {
    document.getElementById('cake-auth-status').textContent = '';
    document.getElementById('cake-auth-btn').disabled = false;
    document.getElementById('cake-auth-btn').textContent = '🔑 Re-authenticate';
    document.getElementById('cake-auth-modal').classList.remove('hidden');
  }

  document.getElementById('cake-auth-dismiss').addEventListener('click', () => {
    document.getElementById('cake-auth-modal').classList.add('hidden');
  });

  document.getElementById('cake-auth-btn').addEventListener('click', async () => {
    const btn = document.getElementById('cake-auth-btn');
    const status = document.getElementById('cake-auth-status');
    btn.disabled = true;
    btn.textContent = '⏳ Opening browser…';
    status.textContent = 'A browser window will open — log in to CakeResume, then wait.';
    status.style.color = '#6b7280';

    await fetch('/api/auth/cakeresume', { method: 'POST' });

    // Poll for completion
    const poll = setInterval(async () => {
      try {
        const data = await fetch('/api/auth/cakeresume/status').then(r => r.json());
        if (data.done) {
          clearInterval(poll);
          status.textContent = '✅ Login successful! Session saved.';
          status.style.color = '#166534';
          btn.textContent = '✓ Done';
          setTimeout(() => {
            document.getElementById('cake-auth-modal').classList.add('hidden');
          }, 2000);
        } else if (data.error) {
          clearInterval(poll);
          status.textContent = `❌ Error: ${data.error}`;
          status.style.color = '#dc2626';
          btn.disabled = false;
          btn.textContent = '🔑 Re-authenticate';
        } else if (!data.running) {
          clearInterval(poll);
          btn.disabled = false;
          btn.textContent = '🔑 Re-authenticate';
        }
      } catch(e) {}
    }, 2000);
  });

  // ── URL Import ────────────────────────────────────────────
  let _importParsed = null;

  function openImportModal() {
    _importParsed = null;
    document.getElementById('import-url').value = '';
    document.getElementById('import-preview').style.display = 'none';
    document.getElementById('import-status').textContent = '';
    document.getElementById('import-status').className = 'modal-status';
    const fetchBtn = document.getElementById('import-fetch');
    fetchBtn.textContent = 'Fetch & Parse';
    fetchBtn.disabled = false;
    document.getElementById('import-modal').classList.remove('hidden');
  }

  document.getElementById('btn-import').addEventListener('click', openImportModal);

  document.getElementById('import-cancel').addEventListener('click', () => {
    document.getElementById('import-modal').classList.add('hidden');
  });

  document.getElementById('import-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
  });

  document.getElementById('import-fetch').addEventListener('click', async () => {
    const btn  = document.getElementById('import-fetch');
    const stat = document.getElementById('import-status');

    // If preview is showing, this is the "Save Job" step
    if (_importParsed) {
      btn.disabled = true;
      btn.textContent = 'Saving…';
      stat.textContent = '';
      const body = {
        title:       document.getElementById('import-title').value.trim(),
        company:     document.getElementById('import-company').value.trim(),
        location:    document.getElementById('import-location').value.trim(),
        market:      document.getElementById('import-market').value,
        description: document.getElementById('import-description').value.trim(),
        url:         document.getElementById('import-url').value.trim(),
      };
      try {
        const res  = await fetch('/api/jobs/import/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Save failed');
        stat.textContent = '✓ Job saved! Match score running in background…';
        stat.className = 'modal-status ok';
        await loadJobs();
        setTimeout(() => {
          document.getElementById('import-modal').classList.add('hidden');
        }, 2000);
      } catch(e) {
        stat.textContent = '✗ ' + e.message;
        stat.className = 'modal-status err';
        btn.disabled = false;
        btn.textContent = 'Save Job';
      }
      return;
    }

    // Fetch & parse
    const url = document.getElementById('import-url').value.trim();
    if (!url) { stat.textContent = 'Please enter a URL.'; stat.className = 'modal-status err'; return; }
    btn.disabled = true;
    btn.textContent = 'Fetching…';
    stat.textContent = 'Fetching page and parsing with AI…';
    stat.className = 'modal-status';

    try {
      const res  = await fetch('/api/jobs/import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Fetch failed');

      _importParsed = data.job;
      document.getElementById('import-title').value       = data.job.title || '';
      document.getElementById('import-company').value     = data.job.company || '';
      document.getElementById('import-location').value    = data.job.location || '';
      document.getElementById('import-market').value      = data.job.market || '';
      document.getElementById('import-description').value = data.job.description || '';
      document.getElementById('import-preview').style.display = 'block';
      stat.textContent = 'Review and edit the fields below, then click Save Job.';
      stat.className = 'modal-status ok';
      btn.disabled = false;
      btn.textContent = 'Save Job';
    } catch(e) {
      stat.textContent = '✗ ' + e.message;
      stat.className = 'modal-status err';
      btn.disabled = false;
      btn.textContent = 'Fetch & Parse';
    }
  });

  // ── Feedback ──────────────────────────────────────────────
  const FB_DOWN_REASONS = [
    { value: 'wrong_industry',  label: '產業不符 (Wrong industry)' },
    { value: 'physical_goods',  label: '實體/供應鏈職位 (Physical goods / supply chain)' },
    { value: 'wrong_level',     label: '職等不符 (Wrong seniority level)' },
    { value: 'wrong_role_type', label: '非軟體/科技職位 (Not software/tech)' },
    { value: 'other',           label: '其他 (Other)' },
  ];
  const FB_UP_REASONS = [
    { value: 'good_fit',    label: '非常合適 (Very good fit)' },
    { value: 'score_low',   label: '分數偏低 (Score seems too low)' },
    { value: 'other',       label: '其他 (Other)' },
  ];

  function openFeedbackModal(jobId, rating) {
    _fbJob = jobId; _fbRating = rating;
    document.getElementById('feedback-modal-title').textContent =
      rating === 'down' ? '👎 Why was this score too high?' : '👍 Why was this score too low?';
    const list = rating === 'down' ? FB_DOWN_REASONS : FB_UP_REASONS;
    const container = document.getElementById('feedback-modal-reasons');
    container.innerHTML = list.map(r => `
      <label class="modal-reason">
        <input type="radio" name="fb-reason" value="${escHtml(r.value)}">
        ${escHtml(r.label)}
      </label>`).join('');
    const first = container.querySelector('input');
    if (first) { first.checked = true; first.closest('.modal-reason').classList.add('selected'); }
    container.querySelectorAll('.modal-reason').forEach(el => {
      el.addEventListener('click', () => {
        container.querySelectorAll('.modal-reason').forEach(x => x.classList.remove('selected'));
        el.classList.add('selected');
        el.querySelector('input').checked = true;
      });
    });
    document.getElementById('feedback-modal').classList.remove('hidden');
  }

  document.getElementById('feedback-cancel').addEventListener('click', () => {
    document.getElementById('feedback-modal').classList.add('hidden');
    _fbJob = _fbRating = null;
  });

  document.getElementById('feedback-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.add('hidden');
      _fbJob = _fbRating = null;
    }
  });

  document.getElementById('feedback-confirm').addEventListener('click', async () => {
    const selected = document.querySelector('input[name=fb-reason]:checked');
    const reason   = selected ? selected.value : null;
    document.getElementById('feedback-modal').classList.add('hidden');
    if (!_fbJob) return;

    await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ job_id: _fbJob, rating: _fbRating, reason, resume_id: RESUME_ID }),
    });

    FEEDBACK_STATE[_fbJob] = { rating: _fbRating };
    _fbJob = _fbRating = null;
    renderJobs();
  });

  // ── Auto-restore previous resume ─────────────────────────
  async function checkPreviousResume() {
    try {
      const res = await fetch('/api/resume/matches');
      const data = await res.json();
      if (!data.resume_id) return;

      RESUME_ID = data.resume_id;

      // Restore whatever matches exist (may be partial if processing was interrupted)
      MATCH_DATA = {};
      for (const m of data.matches || []) {
        MATCH_DATA[m.job_id] = { score: m.score, similarity: m.similarity, explanation: m.explanation };
      }

      if (data.status === 'done') {
        RESUME_STATUS = 'done';
      } else if (data.status === 'processing' || data.status === 'pending') {
        RESUME_STATUS = 'processing';
        // Resume polling so we pick up the final result
        if (_pollTimer) clearInterval(_pollTimer);
        _pollTimer = setInterval(fetchMatches, 4000);
      } else if (data.status && data.status !== 'none') {
        RESUME_STATUS = data.status; // e.g. 'error: GEMINI_API_KEY not set'
      }

      updateResumeUI();
      renderJobs();
    } catch (e) {}
  }

  // ── Boot ──────────────────────────────────────────────────
  loadJobs();
  loadPipelineIds();
  checkPreviousResume();
</script>

</body>
</html>
